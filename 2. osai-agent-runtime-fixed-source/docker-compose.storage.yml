# =============================================================================
# File: docker-compose.storage.yml
# Purpose:
#   Starts the local OSAI support stack with the GGUF model mounted from the host.
#
# Where this fits in OSAI:
#   Best development mode: Postgres, RustFS, llama.cpp/Qwen, and Cognee run together while the model stays in ./models.
#
# Topics to know before editing:
#   Docker Compose services, networks, volumes, health checks, and environment interpolation.
#
# Important operational notes:
#   Uses explicit --mmap and a read-only model mount so rebuilds stay small and runtime downloads are avoided.
# =============================================================================
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: osai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_admin_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - osai-postgres-data:/var/lib/postgresql/data
      - ./storage/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    container_name: osai-rustfs
    restart: unless-stopped
    command: ["--address", ":9000", "--console-enable", "--access-key", "rustfsadmin", "--secret-key", "rustfsadmin", "/data"]
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - osai-rustfs-data:/data
  rustfs-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    container_name: osai-rustfs-init
    depends_on:
      rustfs:
        condition: service_started
    environment:
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-osai-agent}
    # Keep the full script inside the exec-form entrypoint. Some Compose/Engine
    # combinations split a string command after `sh -c`, which made the old
    # container run only `set` and exit successfully without creating a bucket.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "waiting for RustFS S3 API"
        until mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin >/dev/null 2>&1; do
          sleep 2
        done
        echo "ensuring bucket: $${OBJECT_STORE_BUCKET}"
        mc mb --ignore-existing "rustfs/$${OBJECT_STORE_BUCKET}"
        echo "RustFS buckets:"
        mc ls rustfs
    restart: "no"

  llama:
    build:
      context: .
      dockerfile: docker/llama/Dockerfile
    image: osai-llama-qwen:local
    container_name: osai-llama
    restart: unless-stopped
    # The GGUF stays on the host and is mounted read-only. This keeps container
    # rebuilds small and lets llama.cpp memory-map the same local file quickly.
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    # memlock is optional but useful when the host has enough RAM and you choose
    # to add --mlock. The default command below uses --mmap without pinning RAM.
    ulimits:
      memlock:
        soft: -1
        hard: -1
    command:
      - "-m"
      - "/models/${OSAI_GGUF_MODEL_FILE:-Qwen3-4B-Q4_K_M.gguf}"
      - "--mmap"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--alias"
      - "osai-llm"
      - "-c"
      - "4096"
      - "--parallel"
      - "1"
      - "--threads"
      - "4"
      - "--threads-batch"
      - "4"

  cognee:
    build:
      context: .
      dockerfile: docker/cognee/Dockerfile
    container_name: osai-cognee
    restart: unless-stopped
    env_file:
      - .env.cognee
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      SYSTEM_ROOT_DIRECTORY: /data/cognee_system
      DATA_ROOT_DIRECTORY: /data/cognee_data
      LLM_ENDPOINT: http://llama:8080/v1
      OSAI_LLM_ENDPOINT: http://llama:8080/v1
      REQUIRE_AUTHENTICATION: "false"
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8001"
    volumes:
      - osai-cognee-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      llama:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/docs', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  osai-postgres-data:
  osai-rustfs-data:
  osai-cognee-data:
